name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './third_party/*'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build without CGO
        shell: bash
        run: CGO_ENABLED=0 go build ./cmd/faultline
      - name: Build Docker image
        if: runner.os == 'Linux'
        run: docker build -t faultline:ci .

  release-dry-run:
    name: release dry run
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
