name: Feature request
description: Suggest a local analysis, report, or workflow improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scan engine
        - findings/scoring
        - reports/SARIF
        - PR review
        - config/policy
        - baselines/history
        - release/install
        - documentation
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Compatibility, privacy, CI, or governance constraints to preserve.
    validations:
      required: false
