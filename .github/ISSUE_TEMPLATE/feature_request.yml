name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for the OSS scanner are welcome. Features that belong
        in the Enterprise product (dashboards, SSO, RBAC, multi-org management)
        are out of scope here — see gofaultline.dev for Enterprise.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have considered or tried.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is a scanner / local CLI / report / SARIF / PR review feature (OSS scope)
          required: true
