  <g transform="translate(54 586)">
    <rect width="1172" height="76" rx="8" fill="#ffffff" stroke="#d8ddd5"/>
    <text x="22" y="32" fill="#9f2435" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">FL-BND-001 · Boundary violation</text>
    <text x="22" y="56" fill="#1e2420" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">internal/handlers imports forbidden internal/storage package · evidence includes rule, import, owner, and location</text>
