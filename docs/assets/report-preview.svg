    <text x="790" y="51" fill="#48524c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">CHURN</text>
    <text x="940" y="51" fill="#48524c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">OWNER</text>

    <g font-family="Menlo, Consolas, monospace" font-size="16">
      <text x="22" y="99" fill="#1e2420">github.com/acme/api/internal/handlers</text>
      <text x="650" y="99" fill="#9f2435" font-weight="700">82.40</text>
      <text x="790" y="99" fill="#1e2420">914</text>
      <text x="940" y="99" fill="#68716b">@platform-team</text>
      <line x1="0" y1="120" x2="1172" y2="120" stroke="#d8ddd5"/>

      <text x="22" y="154" fill="#1e2420">github.com/acme/payments/internal/store</text>
