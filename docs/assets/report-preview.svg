      <text x="18" y="70" fill="#1e2420" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">42</text>
    </g>
    <g transform="translate(196 0)">
      <rect width="178" height="92" rx="8" fill="#ffffff" stroke="#d8ddd5"/>
