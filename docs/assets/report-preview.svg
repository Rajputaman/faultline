<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Faultline HTML report preview</title>
  <desc id="desc">A stylized preview of a Faultline package risk report showing summary cards, risky packages, and findings.</desc>
  <rect width="1280" height="720" fill="#f7f7f4"/>
  <rect x="0" y="0" width="1280" height="130" fill="#142320"/>
