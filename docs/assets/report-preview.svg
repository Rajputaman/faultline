  <text x="54" y="96" fill="#cbd9d2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Structural risk analysis for Go codebases · local-first · evidence-backed</text>

  <g transform="translate(54 166)">
    <g>
      <rect width="178" height="92" rx="8" fill="#ffffff" stroke="#d8ddd5"/>
