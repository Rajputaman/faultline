      <text x="18" y="70" fill="#9f2435" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">3</text>
    </g>
    <g transform="translate(392 0)">
      <rect width="178" height="92" rx="8" fill="#ffffff" stroke="#d8ddd5"/>
      <text x="18" y="32" fill="#68716b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Warnings</text>
      <text x="18" y="70" fill="#a14d1b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">1</text>
    </g>
    <g transform="translate(588 0)">
      <rect width="178" height="92" rx="8" fill="#ffffff" stroke="#d8ddd5"/>
      <text x="18" y="32" fill="#68716b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Generated</text>
      <text x="18" y="70" fill="#1e2420" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">8.1%</text>
    </g>
  </g>

  <g transform="translate(54 300)">
